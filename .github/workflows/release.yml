name: Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git describe

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-build dependency fix
        run: node scripts/ensure-react-native-codegen-deps.mjs

      - name: Build release APK
        working-directory: android
        run: ./gradlew app:assembleRelease -x lint -x test --configure-on-demand --build-cache -PreactNativeArchitectures=arm64-v8a

      - name: Generate version tag
        id: version
        run: |
          # Create initial tag if none exists
          git tag v1.0.0 2>/dev/null || true
          # Generate version: v1.0.0-<commits>-g<short-sha>
          VERSION=$(git describe --tags --always)
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## Bump Wallet APK

            Automated release from commit ${{ github.sha }}

            **Installation:**
            1. Download `app-release.apk`
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK to install
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
