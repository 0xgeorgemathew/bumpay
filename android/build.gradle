// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url = 'https://www.jitpack.io' }
  }
}

subprojects { subproject ->
  afterEvaluate {
    def androidExtension = subproject.extensions.findByName("android")
    if (androidExtension != null && rootProject.ext.has("ndkVersion")) {
      try {
        androidExtension.ndkVersion = rootProject.ext.get("ndkVersion")
      } catch (ignored) {
        // Some subprojects expose an android extension without ndkVersion.
      }
    }

    subproject.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
      kotlinOptions {
        jvmTarget = "17"
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
